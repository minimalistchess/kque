<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kannada Quest 🦉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Kannada:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#58cc02;--green-dark:#58a700;--green-light:#d7ffb8;--green-bg:#ecffd9;--blue:#1cb0f6;--blue-dark:#1899d6;--blue-light:#ddf4ff;--orange:#ff9600;--orange-dark:#e08600;--red:#ff4b4b;--red-dark:#e84545;--red-light:#ffe5e5;--yellow:#ffc800;--purple:#ce82ff;--purple-dark:#a560cc;--pink:#ff86d0;--text:#3c3c3c;--text-light:#777;--gray:#e5e5e5;--gray-2:#f7f7f7}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#fffbe6,#fff);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.kn-font,.example-sentence .kn,.fc-kannada,.quiz-text,.word{font-family:'Noto Sans Kannada','Nunito',sans-serif}
.app{max-width:920px;margin:0 auto;padding:14px 18px 100px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:2px solid var(--gray);position:sticky;top:0;background:rgba(255,251,230,.95);backdrop-filter:blur(8px);z-index:50;margin-bottom:12px}
.logo{font-size:26px;font-weight:900;color:var(--green-dark);display:flex;align-items:center;gap:8px;cursor:pointer}
.logo .owl{font-size:32px}
.stats{display:flex;gap:14px}
.stat{display:flex;align-items:center;gap:4px;font-weight:800;font-size:17px;color:var(--text)}
.stat .icon{font-size:22px}
.stat.streak{color:var(--orange)}
.stat.xp{color:var(--yellow)}
.stat.gems{color:var(--blue)}
.welcome{text-align:center;padding:24px 16px;background:linear-gradient(135deg,var(--green-light),#fff);border-radius:24px;margin-bottom:22px;border:2px solid var(--green-light)}
.welcome h1{font-size:28px;color:var(--green-dark);margin-bottom:6px;font-weight:900}
.welcome p{color:var(--text);font-size:15px}
.welcome .small{font-size:13px;color:var(--text-light);margin-top:6px}
.section-header{color:#fff;border-radius:18px;padding:16px 22px;margin:22px 0 14px;display:flex;justify-content:space-between;align-items:center}
.section-header.green{background:var(--green);box-shadow:0 4px 0 var(--green-dark)}
.section-header.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-dark)}
.section-header.orange{background:var(--orange);box-shadow:0 4px 0 var(--orange-dark)}
.section-header.purple{background:var(--purple);box-shadow:0 4px 0 var(--purple-dark)}
.section-header.red{background:var(--red);box-shadow:0 4px 0 var(--red-dark)}
.section-header.pink{background:var(--pink);box-shadow:0 4px 0 #d65fa9}
.section-name{font-weight:900;font-size:18px}
.section-sub{opacity:.92;font-size:13px;margin-top:2px}
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:14px;padding:6px 0 12px}
.unit-card{background:#fff;border:2px solid var(--gray);border-radius:18px;padding:16px 12px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 0 var(--gray);position:relative}
.unit-card:hover{transform:translateY(-3px);box-shadow:0 7px 0 var(--gray)}
.unit-card:active{transform:translateY(1px);box-shadow:0 2px 0 var(--gray)}
.unit-card .emoji{font-size:36px;line-height:1}
.unit-card .name{font-weight:800;font-size:13px;margin-top:8px;line-height:1.25}
.unit-card.completed{background:var(--green-bg);border-color:var(--green);box-shadow:0 4px 0 var(--green-dark)}
.unit-card .badge{position:absolute;top:6px;right:6px;font-size:13px;background:var(--yellow);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:800}
.screen{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lesson-top{display:flex;align-items:center;gap:14px;padding:8px 0 14px}
.back-btn{background:#fff;border:2px solid var(--gray);border-radius:50%;width:44px;height:44px;cursor:pointer;flex-shrink:0;font-size:22px;font-weight:900;color:var(--text-light);box-shadow:0 3px 0 var(--gray)}
.lesson-title{font-size:22px;font-weight:900;line-height:1.1}
.lesson-sub{font-size:14px;color:var(--text-light);margin-top:2px}
.btn{background:var(--green);color:#fff;border:none;border-radius:14px;padding:14px 22px;font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 4px 0 var(--green-dark);letter-spacing:.8px;text-transform:uppercase;font-family:inherit;transition:transform .1s}
.btn:hover{transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 var(--green-dark)}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-dark)}
.btn.blue:active:not(:disabled){box-shadow:0 2px 0 var(--blue-dark)}
.btn.orange{background:var(--orange);box-shadow:0 4px 0 var(--orange-dark)}
.btn.orange:active:not(:disabled){box-shadow:0 2px 0 var(--orange-dark)}
.btn.outline{background:#fff;color:var(--text);border:2px solid var(--gray);box-shadow:0 4px 0 var(--gray)}
.btn.outline:active:not(:disabled){box-shadow:0 2px 0 var(--gray)}
.btn.red{background:var(--red);box-shadow:0 4px 0 var(--red-dark)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn-row .btn{flex:1;min-width:140px}
.lesson-info{background:linear-gradient(135deg,#fffbeb,#fff);border-left:5px solid var(--yellow);padding:16px 18px;border-radius:12px;margin:10px 0 16px;line-height:1.6;font-size:15px}
.lesson-info h3{margin-bottom:6px;color:var(--orange-dark);font-size:16px;font-weight:800}
.lesson-info code{background:var(--gray-2);padding:1px 6px;border-radius:4px;font-family:Courier,monospace;color:var(--purple-dark)}
.lesson-info ul{margin:6px 0 6px 22px}
.flashcard{background:#fff;border:2.5px solid var(--gray);border-radius:24px;padding:36px 24px;min-height:320px;display:flex;flex-direction:column;justify-content:center;align-items:center;margin:14px 0;box-shadow:0 5px 0 var(--gray);cursor:pointer;user-select:none}
.flashcard .label{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-light);font-weight:800;margin-bottom:14px}
.fc-kannada{font-size:54px;font-weight:700;color:var(--text);margin-bottom:14px;text-align:center;line-height:1.2}
.fc-trans{font-size:22px;color:var(--blue-dark);font-style:italic;margin-bottom:14px;font-weight:600}
.fc-english{font-size:26px;font-weight:700;color:var(--green-dark);text-align:center}
.fc-hint{font-size:13px;color:var(--text-light);margin-top:24px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.fc-nav{display:flex;justify-content:space-between;gap:10px;margin-top:6px}
.fc-counter{text-align:center;padding:8px;font-weight:700;color:var(--text-light);font-size:14px}
.progress-bar{background:var(--gray);height:14px;border-radius:8px;overflow:hidden;margin:4px 0 16px}
.progress-fill{background:var(--green);height:100%;transition:width .35s ease;position:relative}
.progress-fill::after{content:'';position:absolute;top:2px;left:4px;right:4px;height:4px;background:rgba(255,255,255,.4);border-radius:4px}
.quiz-prompt{font-size:21px;font-weight:900;margin-bottom:18px;line-height:1.3}
.quiz-prompt .small{display:block;font-size:13px;color:var(--text-light);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.quiz-text{font-size:36px;font-weight:700;padding:22px;background:var(--green-bg);border-radius:16px;text-align:center;margin:10px 0 18px;border:2px solid var(--green-light)}
.quiz-text-small{font-size:22px;padding:16px}
.options{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.option{background:#fff;border:2px solid var(--gray);border-radius:14px;padding:16px 12px;cursor:pointer;font-size:16px;font-weight:700;text-align:center;box-shadow:0 3px 0 var(--gray);min-height:60px;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--text)}
.option:hover{background:var(--blue-light);border-color:var(--blue)}
.option.selected{background:var(--blue-light);border-color:var(--blue);color:var(--blue-dark);box-shadow:0 3px 0 var(--blue-dark)}
.option.correct{background:var(--green-bg);border-color:var(--green);color:var(--green-dark);box-shadow:0 3px 0 var(--green-dark)}
.option.wrong{background:var(--red-light);border-color:var(--red);color:var(--red-dark);box-shadow:0 3px 0 var(--red-dark)}
.feedback{position:fixed;bottom:0;left:0;right:0;padding:18px 22px 24px;box-shadow:0 -6px 16px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center;z-index:100;animation:slideUp .25s;flex-wrap:wrap;gap:12px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.feedback.correct{background:var(--green-bg);border-top:3px solid var(--green)}
.feedback.wrong{background:var(--red-light);border-top:3px solid var(--red)}
.feedback-content{flex:1;min-width:180px}
.feedback-title{font-weight:900;font-size:19px;color:var(--green-dark);display:flex;align-items:center;gap:8px}
.feedback.wrong .feedback-title{color:var(--red-dark)}
.feedback-detail{font-size:14px;color:var(--text);margin-top:4px}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 16px}
.match-col{display:flex;flex-direction:column;gap:9px}
.match-item{background:#fff;border:2px solid var(--gray);border-radius:12px;padding:14px 10px;cursor:pointer;font-size:16px;font-weight:700;text-align:center;box-shadow:0 3px 0 var(--gray);font-family:inherit;color:var(--text)}
.match-item:hover{background:var(--blue-light)}
.match-item.selected{background:var(--blue-light);border-color:var(--blue);box-shadow:0 3px 0 var(--blue-dark)}
.match-item.matched{background:var(--green-bg);border-color:var(--green);box-shadow:0 3px 0 var(--green-dark);opacity:.5;pointer-events:none}
.match-item.wrong{background:var(--red-light);border-color:var(--red);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.word-target{display:flex;flex-wrap:wrap;gap:8px;min-height:80px;padding:14px;background:var(--gray-2);border-radius:14px;margin:12px 0;border-bottom:3px solid var(--gray)}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:70px;padding:12px;margin-bottom:16px}
.word{background:#fff;border:2px solid var(--gray);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:17px;font-weight:700;box-shadow:0 3px 0 var(--gray)}
.word:hover{background:var(--blue-light)}
.word.used{opacity:.25;pointer-events:none}
.text-input{width:100%;padding:14px;border:2.5px solid var(--gray);border-radius:14px;font-size:18px;font-family:inherit;font-weight:600;background:#fff}
.text-input:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px var(--blue-light)}
.complete{text-align:center;padding:30px 14px;background:linear-gradient(135deg,var(--green-bg),#fff);border-radius:24px;border:2px solid var(--green-light)}
.complete-emoji{font-size:80px;animation:bounce .7s}
@keyframes bounce{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.complete-title{font-size:26px;font-weight:900;color:var(--green-dark);margin:12px 0 22px}
.complete-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;max-width:480px;margin-left:auto;margin-right:auto}
.cstat{background:#fff;padding:16px 8px;border-radius:14px;border:2px solid var(--green-light);box-shadow:0 3px 0 var(--green-light)}
.cstat-icon{font-size:26px}
.cstat-num{font-size:24px;font-weight:900;color:var(--green-dark);margin:4px 0 2px}
.cstat-label{font-size:12px;color:var(--text-light);font-weight:700;text-transform:uppercase}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--gray);margin:14px 0 16px;overflow-x:auto}
.tab{padding:11px 18px;cursor:pointer;font-weight:800;font-size:13px;color:var(--text-light);border-bottom:4px solid transparent;margin-bottom:-2px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.4px}
.tab.active{color:var(--green-dark);border-color:var(--green)}
.example-sentence{background:var(--blue-light);padding:12px 14px;border-radius:14px;margin:8px 0;line-height:1.5;border-left:4px solid var(--blue)}
.example-sentence .kn{font-size:20px;font-weight:700;color:var(--text);display:block;margin-bottom:4px}
.example-sentence .tr{color:var(--blue-dark);font-style:italic;font-weight:600;font-size:14px}
.example-sentence .en{color:var(--text-light);margin-top:4px;font-weight:600;font-size:14px}
.tense-table{width:100%;border-collapse:separate;border-spacing:0;margin:12px 0;font-size:14px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 3px 0 var(--gray)}
.tense-table th{background:var(--purple);color:#fff;padding:10px;text-align:left;font-weight:800}
.tense-table td{padding:10px;border-bottom:1px solid var(--gray)}
.tense-table td.kn{font-family:'Noto Sans Kannada',sans-serif;font-weight:700;font-size:16px}
.tense-table tr:last-child td{border-bottom:none}
@media (max-width:600px){.app{padding:10px 12px 100px}.fc-kannada{font-size:38px}.fc-english{font-size:20px}.quiz-text{font-size:26px;padding:16px}.options{grid-template-columns:1fr}.complete-stats{grid-template-columns:1fr}.lesson-title{font-size:19px}.welcome h1{font-size:22px}.btn{font-size:12px;padding:12px 16px}}
</style>
</head>

{id:'havebe',name:'To Be & To Have',emoji:'🔑',type:'grammar',
info:`Kannada doesn't use a single word for "is" or "have" like English. Instead, forms of <code>iru</code> (to be) and the dative case express these ideas.

<b>To be — present:</b>
<ul><li><code>iddene</code> – I am</li>
<li><code>iddiya</code> – you are (informal)</li>
<li><code>iddeere</code> – you are (formal)</li>
<li><code>iddaane</code> – he is</li>
<li><code>iddaale</code> – she is</li>
<li><code>ide</code> – it is</li></ul>

<b>To have:</b> Kannada says <code>nanage X ide</code> = "to me X is" = "I have X" (uses dative -ge).`,

{id:'grammar',title:'Section 11 · Grammar Essentials',color:'purple',sub:'Cases, plurals & sentence structure',units:[
{id:'sov',name:'Sentence Structure (SOV)',emoji:'📐',type:'grammar',
info:`Kannada follows <b>Subject – Object – Verb (SOV)</b> order, unlike English (SVO).

<b>English:</b> I (S) eat (V) rice (O).
<b>Kannada:</b> Naanu (S) anna (O) tinnuttene (V).
ನಾನು ಅನ್ನ ತಿನ್ನುತ್ತೇನೆ.

The verb always comes <b>at the end</b>. Adjectives come before nouns. Postpositions (instead of prepositions) follow nouns: <code>maneyalli</code> = "in the house".`,

{id:'cases',name:'The 7 Cases',emoji:'⚙️',type:'grammar',
info:`Kannada has <b>seven cases (vibhakti)</b>, formed by adding suffixes to nouns.

<ol><li><b>Nominative</b> (subject): no suffix — <code>mara</code></li>
<li><b>Accusative</b> (object): -annu — <code>marannu</code></li>
<li><b>Instrumental</b> (with/by): -inda — <code>marainda</code></li>
<li><b>Dative</b> (to/for): -ige/-ge — <code>marakke</code></li>
<li><b>Ablative</b> (from): often -dinda</li>
<li><b>Genitive</b> (of/'s): -a — <code>marada</code></li>
<li><b>Locative</b> (in/at): -alli — <code>maradalli</code></li></ol>`,

{id:'plurals',name:'Plurals',emoji:'🔢',type:'grammar',
info:`Most Kannada nouns form plurals by adding <code>-ಗಳು (-galu)</code> for things, and <code>-ಅರು (-aru)</code> for honored humans.

<ul><li>ಪುಸ್ತಕ (pustaka) → ಪುಸ್ತಕಗಳು (pustakagalu) – books</li>
<li>ಮಗು (magu) → ಮಕ್ಕಳು (makkalu) – children (irregular)</li>
<li>ಶಿಕ್ಷಕ (shikshaka) → ಶಿಕ್ಷಕರು (shikshakaru) – teachers</li></ul>

Adjectives don't change for plural.`,

/* ========== STATE & APP LOGIC ========== */
const state = {
  view: 'home',     // home | unit | flashcard | quiz | complete
  sectionId: null,
  unitId: null,
  unitTab: 'overview', // overview | flashcard | quiz
  cardIndex: 0,
  quizIndex: 0,
  quizQuestions: [],
  quizCorrect: 0,
  quizAnswered: false,
  matchState: null,
  buildState: null,
  xp: 0,
  streak: 0,
  gems: 500,
  completedUnits: new Set(),
  feedback: null,
  selected: null
};

const $app = document.getElementById('app');

function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }
function pick(arr,n){ return shuffle(arr).slice(0,n); }
function findUnit(sid,uid){
  const s = CURRICULUM.find(s=>s.id===sid);
  return s ? s.units.find(u=>u.id===uid) : null;
}
function allCards(){ return CURRICULUM.flatMap(s=>s.units.flatMap(u=>u.cards||[])); }
function unitKey(sid,uid){ return sid+':'+uid; }

/* ========== RENDERERS ========== */
function renderTopbar(){
  return `<div class="topbar">
    <div class="logo" onclick="goHome()"><span class="owl">🦉</span> Kannada Quest</div>
    <div class="stats">
      <div class="stat streak"><span class="icon">🔥</span>${state.streak}</div>
      <div class="stat xp"><span class="icon">⭐</span>${state.xp}</div>
      <div class="stat gems"><span class="icon">💎</span>${state.gems}</div>
    </div>
  </div>`;
}

function renderHome(){
  let html = renderTopbar();
  html += `<div class="welcome">
    <h1>Kannada Quest 🦉</h1>
    <p>Learn Kannada from greetings to grammar — Duolingo-style.</p>
    <div class="small">All sections unlocked · No heart limits · Earn XP & gems</div>
  </div>`;
  for (const sec of CURRICULUM){
    const completed = sec.units.filter(u=>state.completedUnits.has(unitKey(sec.id,u.id))).length;
    html += `<div class="section-header ${sec.color}">
      <div>
        <div class="section-name">${sec.title}</div>
        <div class="section-sub">${sec.sub}</div>
      </div>
      <div style="font-weight:900;font-size:15px;text-align:right;white-space:nowrap;">${completed}/${sec.units.length} ✓</div>
    </div>`;
    html += `<div class="units-grid">`;
    for (const u of sec.units){
      const isDone = state.completedUnits.has(unitKey(sec.id,u.id));
      html += `<div class="unit-card ${isDone?'completed':''}" onclick="openUnit('${sec.id}','${u.id}')">
        ${isDone?'<div class="badge">★</div>':''}
        <div class="emoji">${u.emoji}</div>
        <div class="name">${u.name}</div>
      </div>`;
    }
    html += `</div>`;
  }
  $app.innerHTML = html;
}

function renderUnit(){

  if (!u) { goHome(); return; }
  let html = renderTopbar();
  html += `<div class="screen">
    <div class="lesson-top">
      <button class="back-btn" onclick="goHome()">←</button>
      <div>
        <div class="lesson-title">${u.emoji} ${u.name}</div>
        <div class="lesson-sub">${u.cards.length} cards · ${(u.sentences||[]).length} example sentences</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${state.unitTab==='overview'?'active':''}" onclick="setTab('overview')">Overview</div>

      <div class="tab ${state.unitTab==='quiz'?'active':''}" onclick="startQuiz()">Quiz</div>
    </div>`;
  if (u.info){
    html += `<div class="lesson-info"><h3>📘 Learn the concept</h3>${u.info}</div>`;
  } else {

  html += `<h3 style="margin:18px 0 10px;color:var(--text);">Words in this lesson</h3>`;
  for (const c of u.cards.slice(0,8)){
    html += `<div class="example-sentence"><span class="kn">${c.kn}</span><span class="tr">${c.tr}</span><div class="en">${c.en}</div></div>`;
  }
  if (u.cards.length > 8) html += `<p style="text-align:center;color:var(--text-light);font-weight:700;">…and ${u.cards.length-8} more — see them all in Flashcards</p>`;
  if ((u.sentences||[]).length){
    html += `<h3 style="margin:18px 0 10px;color:var(--text);">Example sentences</h3>`;
    for (const s of u.sentences){
      html += `<div class="example-sentence"><span class="kn">${s.kn}</span><span class="tr">${s.tr}</span><div class="en">${s.en}</div></div>`;
    }
  }
  html += `<div class="btn-row" style="margin-top:20px;">
    <button class="btn" onclick="startFlash()">📇 Start Flashcards</button>
    <button class="btn blue" onclick="startQuiz()">🎯 Take Quiz</button>

function renderFlash(){
  const u = findUnit(state.sectionId, state.unitId);
  if (!u || !u.cards.length) { goHome(); return; }
  const i = state.cardIndex;
  const card = u.cards[i];
  const pct = ((i+1)/u.cards.length)*100;
  let html = renderTopbar();
  html += `<div class="screen">
    <div class="lesson-top">
      <button class="back-btn" onclick="openUnit('${state.sectionId}','${state.unitId}')">←</button>
      <div><div class="lesson-title">${u.emoji} ${u.name}</div><div class="lesson-sub">Flashcards · tap card to flip</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="fc-counter">Card ${i+1} of ${u.cards.length}</div>
    <div class="flashcard" onclick="flipCard()" id="flashcard">
      <div class="label">Kannada</div>
      <div class="fc-kannada">${card.kn}</div>

      <div id="fc-en-wrap" style="display:none;"><div class="label" style="color:var(--green-dark)">English</div><div class="fc-english">${card.en}</div></div>

    </div>
    <div class="fc-nav">
      <button class="btn outline" onclick="prevCard()" ${i===0?'disabled':''}>← Prev</button>

function flipCard(){
  const wrap = document.getElementById('fc-en-wrap');
  const hint = document.getElementById('fc-hint');
  if (wrap.style.display==='none'){ wrap.style.display=''; hint.textContent='👆 Tap again to hide'; }
  else { wrap.style.display='none'; hint.textContent='👆 Tap card to reveal meaning'; }
}
function nextCard(){ state.cardIndex++; renderFlash(); }
function prevCard(){ state.cardIndex--; renderFlash(); }
function finishFlash(){ state.xp += 5; state.unitTab='overview'; renderUnit(); }

/* ========== QUIZ ========== */
function buildQuestions(u){
  const cards = u.cards;
  const pool = allCards();
  const qs = [];
  const used = new Set();
  const num = Math.min(10, cards.length * 2);
  const types = ['mc_en','mc_kn','match','build','type'];
  // Generate a varied mix
  for (let i = 0; i < num; i++){
    const card = cards[i % cards.length];
    let type;
    // First 2 are simple mc_en, then mix it up
    if (i < 2) type = 'mc_en';
    else if (i === 2 && cards.length >= 4) type = 'match';
    else if (i === num-1 && u.sentences && u.sentences.length) type = 'build';
    else type = types[Math.floor(Math.random() * 3)]; // mc_en, mc_kn, match mainly
    
    if (type === 'match' && cards.length < 4) type = 'mc_en';
    if (type === 'build' && (!u.sentences || !u.sentences.length)) type = 'mc_kn';

    if (type === 'mc_en'){
      // Kannada → English
      const distractors = pick(cards.filter(c=>c.en!==card.en), 3);
      if (distractors.length < 3){
        const extras = pick(pool.filter(c=>c.en!==card.en && !distractors.find(d=>d.en===c.en)), 3-distractors.length);
        distractors.push(...extras);
      }
      const opts = shuffle([card, ...distractors]);
      qs.push({type, card, options: opts, correctIdx: opts.findIndex(o=>o.en===card.en)});
    } else if (type === 'mc_kn'){
      // English → Kannada
      const distractors = pick(cards.filter(c=>c.kn!==card.kn), 3);
      if (distractors.length < 3){
        const extras = pick(pool.filter(c=>c.kn!==card.kn && !distractors.find(d=>d.kn===c.kn)), 3-distractors.length);
        distractors.push(...extras);
      }
      const opts = shuffle([card, ...distractors]);
      qs.push({type, card, options: opts, correctIdx: opts.findIndex(o=>o.kn===card.kn)});
    } else if (type === 'match'){
      const matchCards = pick(cards, Math.min(4, cards.length));
      qs.push({type, pairs: matchCards, left: shuffle(matchCards.map(c=>c.kn)), right: shuffle(matchCards.map(c=>c.en))});
    } else if (type === 'build'){
      const sent = pick(u.sentences, 1)[0];
      const words = sent.kn.split(/\s+/);
      const extras = shuffle(['ಮತ್ತು','ಆದರೆ','ಬಹಳ','ತುಂಬಾ']).slice(0, Math.max(0, 4-words.length));
      qs.push({type, sentence: sent, words: shuffle([...words, ...extras])});
    } else if (type === 'type'){
      qs.push({type:'mc_en', card, options: shuffle([card, ...pick(pool.filter(c=>c.en!==card.en),3)]), correctIdx: 0});
      qs[qs.length-1].correctIdx = qs[qs.length-1].options.findIndex(o=>o.en===card.en);
    }
  }
  return qs;
}

function startFlash(){
  state.view = 'flashcard';
  state.cardIndex = 0;
  state.unitTab = 'flashcard';
  renderFlash();
}
function startQuiz(){
  const u = findUnit(state.sectionId, state.unitId);
  if (!u) return;
  state.view = 'quiz';
  state.unitTab = 'quiz';
  state.quizIndex = 0;
  state.quizCorrect = 0;
  state.quizAnswered = false;
  state.feedback = null;
  state.selected = null;
  state.matchState = null;
  state.buildState = null;
  state.quizQuestions = buildQuestions(u);
  renderQuiz();
}

function renderQuiz(){
  const u = findUnit(state.sectionId, state.unitId);
  if (!u) { goHome(); return; }
  if (state.quizIndex >= state.quizQuestions.length){ renderComplete(); return; }
  const q = state.quizQuestions[state.quizIndex];
  const pct = (state.quizIndex / state.quizQuestions.length) * 100;
  let html = renderTopbar();
  html += `<div class="screen">
    <div class="lesson-top">
      <button class="back-btn" onclick="openUnit('${state.sectionId}','${state.unitId}')">✕</button>
      <div style="flex:1"><div class="progress-bar" style="margin:0"><div class="progress-fill" style="width:${pct}%"></div></div></div>
      <div style="font-weight:900;color:var(--green-dark);">${state.quizIndex+1}/${state.quizQuestions.length}</div>
    </div>`;

  if (q.type === 'mc_en'){
    html += `<div class="quiz-prompt"><span class="small">Translate to English</span></div>
      <div class="quiz-text">${q.card.kn}<div style="font-size:16px;font-style:italic;color:var(--text-light);margin-top:8px;font-family:'Nunito',sans-serif;font-weight:600;">${q.card.tr}</div></div>
      <div class="options">`;
    q.options.forEach((o,idx)=>{
      let cls = 'option';
      if (state.quizAnswered){
        if (idx === q.correctIdx) cls += ' correct';
        else if (idx === state.selected) cls += ' wrong';
      } else if (idx === state.selected) cls += ' selected';
      html += `<button class="${cls}" onclick="selectOption(${idx})" ${state.quizAnswered?'disabled':''}>${o.en}</button>`;
    });
    html += `</div>`;
  } else if (q.type === 'mc_kn'){
    html += `<div class="quiz-prompt"><span class="small">Choose the Kannada</span></div>
      <div class="quiz-text quiz-text-small" style="background:var(--blue-light);border-color:var(--blue);font-family:'Nunito',sans-serif;">${q.card.en}</div>
      <div class="options">`;
    q.options.forEach((o,idx)=>{
      let cls = 'option';
      if (state.quizAnswered){
        if (idx === q.correctIdx) cls += ' correct';
        else if (idx === state.selected) cls += ' wrong';
      } else if (idx === state.selected) cls += ' selected';
      html += `<button class="${cls}" onclick="selectOption(${idx})" ${state.quizAnswered?'disabled':''}><div style="font-family:'Noto Sans Kannada',sans-serif;font-size:20px;">${o.kn}</div><div style="font-size:12px;color:var(--text-light);font-style:italic;margin-top:2px;">${o.tr}</div></button>`;
    });
    html += `</div>`;
  } else if (q.type === 'match'){
    if (!state.matchState) state.matchState = {leftPicked:null, rightPicked:null, matched:new Set(), wrong:null};
    const ms = state.matchState;
    html += `<div class="quiz-prompt"><span class="small">Match the pairs</span>Tap a Kannada word, then its English meaning</div>
      <div class="match-grid">
      <div class="match-col">`;
    q.left.forEach((kn,idx)=>{
      let cls = 'match-item';
      if (ms.matched.has('L'+idx)) cls += ' matched';
      if (ms.leftPicked === idx) cls += ' selected';
      if (ms.wrong && ms.wrong[0]==='L' && ms.wrong[1]===idx) cls += ' wrong';
      cls += ' kn-font';
      html += `<button class="${cls}" onclick="matchPick('L',${idx})">${kn}</button>`;
    });
    html += `</div><div class="match-col">`;
    q.right.forEach((en,idx)=>{
      let cls = 'match-item';
      if (ms.matched.has('R'+idx)) cls += ' matched';
      if (ms.rightPicked === idx) cls += ' selected';
      if (ms.wrong && ms.wrong[0]==='R' && ms.wrong[1]===idx) cls += ' wrong';
      html += `<button class="${cls}" onclick="matchPick('R',${idx})">${en}</button>`;
    });
    html += `</div></div>`;
  } else if (q.type === 'build'){
    if (!state.buildState) state.buildState = {used:new Set(), built:[]};
    const bs = state.buildState;
    html += `<div class="quiz-prompt"><span class="small">Build the sentence</span>${q.sentence.en}</div>
      <div class="word-target">`;
    bs.built.forEach((wi,i)=>{ html += `<button class="word" onclick="buildRemove(${i})">${q.words[wi]}</button>`; });
    html += `</div><div class="word-bank">`;
    q.words.forEach((w,i)=>{
      const used = bs.used.has(i) ? 'used' : '';
      html += `<button class="word ${used}" onclick="buildAdd(${i})">${w}</button>`;
    });
    html += `</div><button class="btn blue" onclick="checkBuild()" ${state.quizAnswered?'disabled':''}>Check Answer</button>`;
  }

  html += `</div>`;
  if (state.feedback){
    const fb = state.feedback;
    html += `<div class="feedback ${fb.correct?'correct':'wrong'}">
      <div class="feedback-content">
        <div class="feedback-title">${fb.correct?'✓ Excellent!':'✗ Not quite'}</div>
        <div class="feedback-detail">${fb.detail||''}</div>
      </div>
      <button class="btn ${fb.correct?'':'red'}" onclick="nextQuestion()">Continue →</button>
    </div>`;
  }
  $app.innerHTML = html;
}

function selectOption(idx){
  if (state.quizAnswered) return;
  state.selected = idx;
  const q = state.quizQuestions[state.quizIndex];
  const correct = idx === q.correctIdx;
  state.quizAnswered = true;
  if (correct){ state.quizCorrect++; state.xp += 10; state.gems += 1; }
  const answer = q.type === 'mc_en' ? q.card.en : q.card.kn + ' (' + q.card.tr + ')';
  state.feedback = {correct, detail: correct ? `+10 XP · ${q.card.kn} = ${q.card.en}` : `Correct answer: ${answer}`};
  renderQuiz();
}

function matchPick(side, idx){
  const q = state.quizQuestions[state.quizIndex];
  const ms = state.matchState;
  if (ms.matched.has(side+idx)) return;
  if (side === 'L') ms.leftPicked = idx;
  else ms.rightPicked = idx;
  renderQuiz();
  if (ms.leftPicked !== null && ms.rightPicked !== null){
    const knText = q.left[ms.leftPicked];
    const enText = q.right[ms.rightPicked];
    const pair = q.pairs.find(p=>p.kn===knText);
    if (pair && pair.en === enText){
      ms.matched.add('L'+ms.leftPicked); ms.matched.add('R'+ms.rightPicked);
      ms.leftPicked = null; ms.rightPicked = null;
      state.xp += 3;
      if (ms.matched.size === q.pairs.length*2){
        state.quizCorrect++; state.xp += 5; state.gems += 1;
        state.quizAnswered = true;
        state.feedback = {correct:true, detail:'All pairs matched! +20 XP total'};
      }
      renderQuiz();
    } else {
      ms.wrong = [side, idx];
      renderQuiz();
      setTimeout(()=>{ ms.wrong = null; ms.leftPicked = null; ms.rightPicked = null; renderQuiz(); }, 600);
    }
  }
}

function buildAdd(i){
  if (state.quizAnswered) return;
  const bs = state.buildState;
  if (bs.used.has(i)) return;
  bs.used.add(i); bs.built.push(i);
  renderQuiz();
}
function buildRemove(pos){
  if (state.quizAnswered) return;
  const bs = state.buildState;
  const wi = bs.built[pos];
  bs.built.splice(pos,1); bs.used.delete(wi);
  renderQuiz();
}
function checkBuild(){
  const q = state.quizQuestions[state.quizIndex];
  const bs = state.buildState;
  const built = bs.built.map(i=>q.words[i]).join(' ').trim();
  const target = q.sentence.kn.trim();
  // Compare ignoring extra spaces
  const correct = built.replace(/\s+/g,' ') === target.replace(/\s+/g,' ');
  state.quizAnswered = true;
  if (correct){ state.quizCorrect++; state.xp += 15; state.gems += 2; }
  state.feedback = {correct, detail: correct ? `+15 XP · Perfect sentence!` : `Correct: ${q.sentence.kn} — ${q.sentence.en}`};
  renderQuiz();
}

function nextQuestion(){
  state.quizIndex++;
  state.quizAnswered = false;
  state.feedback = null;
  state.selected = null;
  state.matchState = null;
  state.buildState = null;
  if (state.quizIndex >= state.quizQuestions.length) renderComplete();
  else renderQuiz();
}

function renderComplete(){
  const u = findUnit(state.sectionId, state.unitId);
  const total = state.quizQuestions.length;
  const score = state.quizCorrect;
  const pct = Math.round((score/total)*100);
  const passed = pct >= 60;
  if (passed) state.completedUnits.add(unitKey(state.sectionId, state.unitId));
  if (passed) state.streak++;
  const xpEarned = score * 10;
  let html = renderTopbar();
  html += `<div class="screen complete">
    <div class="complete-emoji">${passed?'🎉':'💪'}</div>
    <div class="complete-title">${passed?'Lesson Complete!':'Keep practicing!'}</div>
    <p style="color:var(--text);font-size:16px;margin-bottom:6px;">${u.emoji} ${u.name}</p>
    <p style="color:var(--text-light);font-size:14px;">${passed?'Amazing work — you nailed it!':'Try again to master this lesson.'}</p>
    <div class="complete-stats">
      <div class="cstat"><div class="cstat-icon">🎯</div><div class="cstat-num">${score}/${total}</div><div class="cstat-label">Correct</div></div>
      <div class="cstat"><div class="cstat-icon">⭐</div><div class="cstat-num">+${xpEarned}</div><div class="cstat-label">XP earned</div></div>
      <div class="cstat"><div class="cstat-icon">📊</div><div class="cstat-num">${pct}%</div><div class="cstat-label">Score</div></div>
    </div>
    <div class="btn-row" style="margin-top:20px;justify-content:center;">
      <button class="btn outline" onclick="startQuiz()">↻ Retry</button>
      <button class="btn" onclick="goHome()">🏠 Home</button>
    </div>
  </div>`;
  $app.innerHTML = html;
  window.scrollTo(0,0);
}

/* ========== NAVIGATION ========== */
function goHome(){
  state.view = 'home';
  state.sectionId = null;
  state.unitId = null;
  state.unitTab = 'overview';
  renderHome();
  window.scrollTo(0,0);
}
function openUnit(sid, uid){
  state.view = 'unit';
  state.sectionId = sid;
  state.unitId = uid;
  state.unitTab = 'overview';
  state.cardIndex = 0;
  renderUnit();
  window.scrollTo(0,0);
}
function setTab(name){
  state.unitTab = name;
  if (name === 'overview') renderUnit();
  else if (name === 'flashcard') startFlash();
  else if (name === 'quiz') startQuiz();
}

/* ========== BOOT ========== */
renderHome();
</script>
</body>
</html>
