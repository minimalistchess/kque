<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kannada Quest 🦉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Kannada:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#58cc02;--green-dark:#58a700;--green-light:#d7ffb8;--green-bg:#ecffd9;--blue:#1cb0f6;--blue-dark:#1899d6;--blue-light:#ddf4ff;--orange:#ff9600;--orange-dark:#e08600;--red:#ff4b4b;--red-dark:#e84545;--red-light:#ffe5e5;--yellow:#ffc800;--purple:#ce82ff;--purple-dark:#a560cc;--pink:#ff86d0;--text:#3c3c3c;--text-light:#777;--gray:#e5e5e5;--gray-2:#f7f7f7}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#fffbe6,#fff);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.kn-font,.example-sentence .kn,.fc-kannada,.quiz-text,.word{font-family:'Nunito',sans-serif}
.app{max-width:920px;margin:0 auto;padding:14px 18px 100px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:2px solid var(--gray);position:sticky;top:0;background:rgba(255,251,230,.95);backdrop-filter:blur(8px);z-index:50;margin-bottom:12px}
.logo{font-size:26px;font-weight:900;color:var(--green-dark);display:flex;align-items:center;gap:8px;cursor:pointer}
.logo .owl{font-size:32px}
.stats{display:flex;gap:14px}
.stat{display:flex;align-items:center;gap:4px;font-weight:800;font-size:17px;color:var(--text)}
.stat .icon{font-size:22px}
.stat.streak{color:var(--orange)}
.stat.xp{color:var(--yellow)}
.stat.gems{color:var(--blue)}
.welcome{text-align:center;padding:24px 16px;background:linear-gradient(135deg,var(--green-light),#fff);border-radius:24px;margin-bottom:22px;border:2px solid var(--green-light)}
.welcome h1{font-size:28px;color:var(--green-dark);margin-bottom:6px;font-weight:900}
.welcome p{color:var(--text);font-size:15px}
.welcome .small{font-size:13px;color:var(--text-light);margin-top:6px}
.section-header{color:#fff;border-radius:18px;padding:16px 22px;margin:22px 0 14px;display:flex;justify-content:space-between;align-items:center}
.section-header.green{background:var(--green);box-shadow:0 4px 0 var(--green-dark)}
.section-header.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-dark)}
.section-header.orange{background:var(--orange);box-shadow:0 4px 0 var(--orange-dark)}
.section-header.purple{background:var(--purple);box-shadow:0 4px 0 var(--purple-dark)}
.section-header.red{background:var(--red);box-shadow:0 4px 0 var(--red-dark)}
.section-header.pink{background:var(--pink);box-shadow:0 4px 0 #d65fa9}
.section-name{font-weight:900;font-size:18px}
.section-sub{opacity:.92;font-size:13px;margin-top:2px}
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:14px;padding:6px 0 12px}
.unit-card{background:#fff;border:2px solid var(--gray);border-radius:18px;padding:16px 12px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 0 var(--gray);position:relative}
.unit-card:hover{transform:translateY(-3px);box-shadow:0 7px 0 var(--gray)}
.unit-card:active{transform:translateY(1px);box-shadow:0 2px 0 var(--gray)}
.unit-card .emoji{font-size:36px;line-height:1}
.unit-card .name{font-weight:800;font-size:13px;margin-top:8px;line-height:1.25}
.unit-card.completed{background:var(--green-bg);border-color:var(--green);box-shadow:0 4px 0 var(--green-dark)}
.unit-card .badge{position:absolute;top:6px;right:6px;font-size:13px;background:var(--yellow);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:800}
.screen{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lesson-top{display:flex;align-items:center;gap:14px;padding:8px 0 14px}
.back-btn{background:#fff;border:2px solid var(--gray);border-radius:50%;width:44px;height:44px;cursor:pointer;flex-shrink:0;font-size:22px;font-weight:900;color:var(--text-light);box-shadow:0 3px 0 var(--gray)}
.lesson-title{font-size:22px;font-weight:900;line-height:1.1}
.lesson-sub{font-size:14px;color:var(--text-light);margin-top:2px}
.btn{background:var(--green);color:#fff;border:none;border-radius:14px;padding:14px 22px;font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 4px 0 var(--green-dark);letter-spacing:.8px;text-transform:uppercase;font-family:inherit;transition:transform .1s}
.btn:hover{transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 var(--green-dark)}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-dark)}
.btn.blue:active:not(:disabled){box-shadow:0 2px 0 var(--blue-dark)}
.btn.orange{background:var(--orange);box-shadow:0 4px 0 var(--orange-dark)}
.btn.orange:active:not(:disabled){box-shadow:0 2px 0 var(--orange-dark)}
.btn.outline{background:#fff;color:var(--text);border:2px solid var(--gray);box-shadow:0 4px 0 var(--gray)}
.btn.outline:active:not(:disabled){box-shadow:0 2px 0 var(--gray)}
.btn.red{background:var(--red);box-shadow:0 4px 0 var(--red-dark)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn-row .btn{flex:1;min-width:140px}
.lesson-info{background:linear-gradient(135deg,#fffbeb,#fff);border-left:5px solid var(--yellow);padding:18px 20px;border-radius:14px;margin:10px 0 16px;line-height:1.65;font-size:15px}.lesson-info h3{margin-top:14px}.lesson-info h3:first-child{margin-top:0}.lesson-info ul,.lesson-info ol{margin:6px 0 10px 22px}.lesson-info li{margin-bottom:4px}.lesson-info table{font-size:13px}
.lesson-info h3{margin-bottom:6px;color:var(--orange-dark);font-size:16px;font-weight:800}
.lesson-info code{background:var(--gray-2);padding:1px 6px;border-radius:4px;font-family:Courier,monospace;color:var(--purple-dark)}
.lesson-info ul{margin:6px 0 6px 22px}
.flashcard{background:#fff;border:2.5px solid var(--gray);border-radius:24px;padding:36px 24px;min-height:320px;display:flex;flex-direction:column;justify-content:center;align-items:center;margin:14px 0;box-shadow:0 5px 0 var(--gray);cursor:pointer;user-select:none}
.flashcard .label{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-light);font-weight:800;margin-bottom:14px}
.fc-kannada{font-size:54px;font-weight:700;color:var(--text);margin-bottom:14px;text-align:center;line-height:1.2}
.fc-trans{font-size:22px;color:var(--blue-dark);font-style:italic;margin-bottom:14px;font-weight:600}
.fc-english{font-size:26px;font-weight:700;color:var(--green-dark);text-align:center}
.fc-hint{font-size:13px;color:var(--text-light);margin-top:24px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.fc-nav{display:flex;justify-content:space-between;gap:10px;margin-top:6px}
.fc-counter{text-align:center;padding:8px;font-weight:700;color:var(--text-light);font-size:14px}
.progress-bar{background:var(--gray);height:14px;border-radius:8px;overflow:hidden;margin:4px 0 16px}
.progress-fill{background:var(--green);height:100%;transition:width .35s ease;position:relative}
.progress-fill::after{content:'';position:absolute;top:2px;left:4px;right:4px;height:4px;background:rgba(255,255,255,.4);border-radius:4px}
.quiz-prompt{font-size:21px;font-weight:900;margin-bottom:18px;line-height:1.3}
.quiz-prompt .small{display:block;font-size:13px;color:var(--text-light);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.quiz-text{font-size:36px;font-weight:700;padding:22px;background:var(--green-bg);border-radius:16px;text-align:center;margin:10px 0 18px;border:2px solid var(--green-light)}
.quiz-text-small{font-size:22px;padding:16px}
.options{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.option{background:#fff;border:2px solid var(--gray);border-radius:14px;padding:16px 12px;cursor:pointer;font-size:16px;font-weight:700;text-align:center;box-shadow:0 3px 0 var(--gray);min-height:60px;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--text)}
.option:hover{background:var(--blue-light);border-color:var(--blue)}
.option.selected{background:var(--blue-light);border-color:var(--blue);color:var(--blue-dark);box-shadow:0 3px 0 var(--blue-dark)}
.option.correct{background:var(--green-bg);border-color:var(--green);color:var(--green-dark);box-shadow:0 3px 0 var(--green-dark)}
.option.wrong{background:var(--red-light);border-color:var(--red);color:var(--red-dark);box-shadow:0 3px 0 var(--red-dark)}
.feedback{position:fixed;bottom:0;left:0;right:0;padding:18px 22px 24px;box-shadow:0 -6px 16px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center;z-index:100;animation:slideUp .25s;flex-wrap:wrap;gap:12px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.feedback.correct{background:var(--green-bg);border-top:3px solid var(--green)}
.feedback.wrong{background:var(--red-light);border-top:3px solid var(--red)}
.feedback-content{flex:1;min-width:180px}
.feedback-title{font-weight:900;font-size:19px;color:var(--green-dark);display:flex;align-items:center;gap:8px}
.feedback.wrong .feedback-title{color:var(--red-dark)}
.feedback-detail{font-size:14px;color:var(--text);margin-top:4px}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 16px}
.match-col{display:flex;flex-direction:column;gap:9px}
.match-item{background:#fff;border:2px solid var(--gray);border-radius:12px;padding:14px 10px;cursor:pointer;font-size:16px;font-weight:700;text-align:center;box-shadow:0 3px 0 var(--gray);font-family:inherit;color:var(--text)}
.match-item:hover{background:var(--blue-light)}
.match-item.selected{background:var(--blue-light);border-color:var(--blue);box-shadow:0 3px 0 var(--blue-dark)}
.match-item.matched{background:var(--green-bg);border-color:var(--green);box-shadow:0 3px 0 var(--green-dark);opacity:.5;pointer-events:none}
.match-item.wrong{background:var(--red-light);border-color:var(--red);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.word-target{display:flex;flex-wrap:wrap;gap:8px;min-height:80px;padding:14px;background:var(--gray-2);border-radius:14px;margin:12px 0;border-bottom:3px solid var(--gray)}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:70px;padding:12px;margin-bottom:16px}
.word{background:#fff;border:2px solid var(--gray);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:17px;font-weight:700;box-shadow:0 3px 0 var(--gray)}
.word:hover{background:var(--blue-light)}
.word.used{opacity:.25;pointer-events:none}
.text-input{width:100%;padding:14px;border:2.5px solid var(--gray);border-radius:14px;font-size:18px;font-family:inherit;font-weight:600;background:#fff}
.text-input:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px var(--blue-light)}
.complete{text-align:center;padding:30px 14px;background:linear-gradient(135deg,var(--green-bg),#fff);border-radius:24px;border:2px solid var(--green-light)}
.complete-emoji{font-size:80px;animation:bounce .7s}
@keyframes bounce{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.complete-title{font-size:26px;font-weight:900;color:var(--green-dark);margin:12px 0 22px}
.complete-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;max-width:480px;margin-left:auto;margin-right:auto}
.cstat{background:#fff;padding:16px 8px;border-radius:14px;border:2px solid var(--green-light);box-shadow:0 3px 0 var(--green-light)}
.cstat-icon{font-size:26px}
.cstat-num{font-size:24px;font-weight:900;color:var(--green-dark);margin:4px 0 2px}
.cstat-label{font-size:12px;color:var(--text-light);font-weight:700;text-transform:uppercase}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--gray);margin:14px 0 16px;overflow-x:auto}
.tab{padding:11px 18px;cursor:pointer;font-weight:800;font-size:13px;color:var(--text-light);border-bottom:4px solid transparent;margin-bottom:-2px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.4px}
.tab.active{color:var(--green-dark);border-color:var(--green)}
.example-sentence{background:var(--blue-light);padding:12px 14px;border-radius:14px;margin:8px 0;line-height:1.5;border-left:4px solid var(--blue)}
.example-sentence .kn{font-size:20px;font-weight:700;color:var(--text);display:block;margin-bottom:4px}
.example-sentence .tr{color:var(--blue-dark);font-style:italic;font-weight:600;font-size:14px}
.example-sentence .en{color:var(--text-light);margin-top:4px;font-weight:600;font-size:14px}
.tense-table{width:100%;border-collapse:separate;border-spacing:0;margin:12px 0;font-size:14px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 3px 0 var(--gray)}
.tense-table th{background:var(--purple);color:#fff;padding:10px;text-align:left;font-weight:800}
.tense-table td{padding:10px;border-bottom:1px solid var(--gray)}
.tense-table td.kn{font-family:'Noto Sans Kannada',sans-serif;font-weight:700;font-size:16px}
.tense-table tr:last-child td{border-bottom:none}
@media (max-width:600px){.app{padding:10px 12px 100px}.fc-kannada{font-size:38px}.fc-english{font-size:20px}.quiz-text{font-size:26px;padding:16px}.options{grid-template-columns:1fr}.complete-stats{grid-template-columns:1fr}.lesson-title{font-size:19px}.welcome h1{font-size:22px}.btn{font-size:12px;padding:12px 16px}}
</style>
</head>

<div class="app" id="app"></div>

{id:'greetings',name:'Greetings',emoji:'👋',type:'vocab',
info:`<h3>💡 Pro Tips & Nuances</h3>
<ul>
<li><b>Namaskara</b> — safest universal greeting; works for hello AND goodbye, formal and informal.</li>
<li><b>Hegiddiri?</b> (formal/plural) vs <b>Hegiddiya?</b> (informal, friends) — default to formal with strangers and elders.</li>
<li><b>Dhanyavaadagalu</b> (thank you) is formal; in casual speech most Kannadigas just smile or say "thanks" — but using it shows respect.</li>
<li><b>Kshamisi</b> covers BOTH "sorry" AND "excuse me" — use it to apologize or to get someone's attention politely.</li>
<li>Same root letters as Marathi: <i>namaskar, dhanyavaad</i> — you already know more than you think!</li>
</ul>`,cards:[

info:`<h3>💡 Critical Usage Notes</h3>
<ul>
<li><b>Neenu</b> (you) is informal — use only with very close friends, children, or someone clearly junior. With anyone else, use <b>Neevu</b>. Using <i>Neenu</i> with the wrong person is rude.</li>

<li>The dative forms (<b>Nanage / Nimage / Avanige</b>) are used for: "I want", "I have", "to me/him", AND emotions (<i>Nanage santosha aagide</i> = I am happy).</li>

{id:'family',name:'Family',emoji:'👨‍👩‍👧',type:'vocab',
info:`<h3>💡 Critical Family Distinctions</h3>
<ul>
<li><b>Anna vs Tamma</b>: Kannada ALWAYS distinguishes <b>elder</b> (anna) vs <b>younger</b> (tamma) brother — there's no generic word "brother". Same with <b>Akka</b> (elder sister) vs <b>Tangi</b> (younger sister).</li>
<li><b>Appa / Amma</b> are universal — used for your own parents AND as a respectful way to address any older person of that gender. Calling an elderly lady "Amma" is polite.</li>
<li><b>Magu</b> = baby or child, gender-neutral. Adult son = <i>maga</i>, daughter = <i>magalu</i>.</li>
<li>Unlike Hindi/Marathi, grandparents (<b>ajja / ajji</b>) use the same words for both maternal and paternal — much simpler!</li>
</ul>`,cards:[

{id:'relatives',name:'Relatives',emoji:'👪',type:'vocab',
info:`<h3>💡 Maternal vs Paternal — Watch Out</h3>

<li><b>Chikkamma</b> / <b>Doddamma</b> = mother's <b>younger</b> / <b>elder</b> sister respectively.</li>

<li><b>Atte</b> = <b>paternal aunt</b> OR <b>mother-in-law</b>. Again, context-dependent.</li>
<li>If unsure, ask the relationship — Kannadigas appreciate when learners try to get this right.</li>

info:`<h3>💡 Emotions Happen TO You</h3>
Pattern: <b>"Nanage [emotion] aagide"</b> = "I feel [emotion]" (literally "to me, X has become").
<ul>
<li><b>Nanage santosha aagide</b> – I am happy.</li>
<li><b>Nanage bhaya aagide</b> – I'm scared.</li>
<li><b>Nanage besara aagide</b> – I'm sad / bored.</li>
<li><b>Nanage kopa baruttide</b> – I'm getting angry.</li>
</ul>

info:`<h3>💡 The -hannu Suffix</h3>
Many fruit names end in <b>-hannu</b> (literally "ripe fruit"):
<ul>
<li><b>balehannu</b> = banana, <b>maavinahannu</b> = ripe mango, <b>kittale hannu</b> = orange.</li>
<li>When raw / unripe / used as a vegetable, the suffix becomes <b>-kaayi</b>: <b>maavinakaayi</b> = raw mango (used in pickles!).</li>
</ul>
So <b>maavinakaayi</b> ≠ <b>maavinahannu</b> — one is sour and raw, the other ripe and sweet.`,cards:[

{id:'meals',name:'Meals & Food',emoji:'🍚',type:'vocab',
info:`<h3>💡 "Eat" — Tinnu vs Oota maadu</h3>
<ul>
<li><b>Tinnu</b> (to eat) — general; use for anything edible: snack, fruit, biscuit.<br><i>Sebu tinde</i> = I ate an apple.</li>
<li><b>Oota maadu</b> (literally "do a meal") — specifically having a proper meal (lunch / dinner).<br><i>Oota maadidiraa?</i> = Have you had your meal? (a very common greeting!)</li>
</ul>
Mirrors Marathi exactly: <b>khalle</b> (ate anything) vs <b>jevan kele</b> (had a meal).
<h3>💡 Drinks Verb</h3>
<b>Kudi</b> (drink) is used for liquids only. Use <i>tinnu</i> for solid food, <i>kudi</i> for liquids.`,cards:[

info:`<h3>💡 Day Pattern</h3>
All weekdays end in <b>-vaara</b> ("day"):
<ul>
<li>Soma-vaara (Mon – Moon day) · Mangala-vaara (Tue – Mars)</li>
<li>Budha-vaara (Wed – Mercury) · Guru-vaara (Thu – Jupiter)</li>
<li>Shukra-vaara (Fri – Venus) · Shani-vaara (Sat – Saturn)</li>
<li>Bhaanu-vaara (Sun – Sun)</li>

info:`<h3>💡 Dictionary Form vs Use</h3>
The forms shown are <b>verb roots</b> (also informal commands). To conjugate, add a person ending:
<ul>
<li><b>Maadu</b> (do) → <b>maaduttene</b> (I do) → <b>maadidde</b> (I did) → <b>maadiddene</b> (I have done).</li>

<li>Negative command: <b>-beda</b> (informal) / <b>-bedi</b> (polite) → <b>Maadabeda</b> (don't do).</li>
</ul>`,cards:[

info:`<h3>💡 Compound Verbs</h3>

{id:'havebe',name:'To Be & To Have',emoji:'🔑',type:'grammar',
info:`Kannada doesn't use a single word for "is" or "have" like English. Instead, forms of <code>iru</code> (to be) and the dative case express these ideas.

<b>To be — present:</b>
<ul><li><code>iddene</code> – I am</li>
<li><code>iddiya</code> – you are (informal)</li>
<li><code>iddeere</code> – you are (formal)</li>
<li><code>iddaane</code> – he is</li>
<li><code>iddaale</code> – she is</li>
<li><code>ide</code> – it is</li></ul>

<b>To have:</b> Kannada says <code>nanage X ide</code> = "to me X is" = "I have X" (uses dative -ge).


<h3>💡 The #1 Beginner Mistake</h3>
<ul>
<li><b>Alla</b> – "is not" (identity / equality). <i>Avanu doctor alla</i> = He is not a doctor.</li>
<li><b>Illa</b> – "doesn't exist / doesn't have / didn't happen". <i>Nanage time illa</i> = I don't have time.</li>
</ul>
Identity → <b>alla</b>. Existence / possession → <b>illa</b>.
<h3>💡 Have = "to me X exists"</h3>
Kannada has NO direct verb for "to have". Use the dative + ide:
<ul>
<li><b>Nanage naayi ide</b> – I have a dog (literally "to me, dog exists").</li>
<li><b>Avanige hana illa</b> – He has no money (literally "to him, money doesn't exist").</li>
</ul>
This is exactly the Marathi pattern: <i>"Maazya kade kutra aahe"</i> ≈ "Nanage naayi ide".`,

{id:'grammar',title:'Section 11 · Grammar Essentials',color:'purple',sub:'Cases, plurals & sentence structure',units:[
{id:'sov',name:'Sentence Structure (SOV)',emoji:'📐',type:'grammar',
info:`Kannada follows <b>Subject – Object – Verb (SOV)</b> order, unlike English (SVO).

<b>English:</b> I (S) eat (V) rice (O).
<b>Kannada:</b> Naanu (S) anna (O) tinnuttene (V).
ನಾನು ಅನ್ನ ತಿನ್ನುತ್ತೇನೆ.

The verb always comes <b>at the end</b>. Adjectives come before nouns. Postpositions (instead of prepositions) follow nouns: <code>maneyalli</code> = "in the house".


<h3>💡 #1 Mistake of English Speakers</h3>
Don't translate word-for-word from English. English: "I eat rice" tempts you to say <i>"Naanu tinnuttene anna"</i> — <b>WRONG</b>.
<br>Correct: <b>"Naanu anna tinnuttene"</b> — verb goes LAST.
<br><br>
Rule of thumb: <b>whatever the verb is, it goes at the END</b>. Everything else (subject, object, time words, etc.) stacks before it. Once you accept this, Kannada flows naturally.`,

{id:'cases',name:'The 7 Cases',emoji:'⚙️',type:'grammar',
info:`Kannada has <b>seven cases (vibhakti)</b>, formed by adding suffixes to nouns.

<ol><li><b>Nominative</b> (subject): no suffix — <code>mara</code></li>
<li><b>Accusative</b> (object): -annu — <code>marannu</code></li>
<li><b>Instrumental</b> (with/by): -inda — <code>marainda</code></li>
<li><b>Dative</b> (to/for): -ige/-ge — <code>marakke</code></li>
<li><b>Ablative</b> (from): often -dinda</li>
<li><b>Genitive</b> (of/'s): -a — <code>marada</code></li>
<li><b>Locative</b> (in/at): -alli — <code>maradalli</code></li></ol>


<h3>💡 Suffix Cheat Sheet</h3>
<ul>
<li><b>Nominative</b>: nothing — <i>mara</i></li>
<li><b>Accusative</b>: <b>-annu</b> — <i>marannu</i> (the tree, as object)</li>
<li><b>Instrumental / Ablative</b>: <b>-inda</b> — <i>marainda</i> (from / by the tree)</li>
<li><b>Dative</b>: <b>-ge / -ige / -kke</b> — <i>marakke</i> (to the tree)</li>
<li><b>Genitive</b>: <b>-a / -ada</b> — <i>marada</i> (of the tree)</li>
<li><b>Locative</b>: <b>-alli / -dalli</b> — <i>maradalli</i> (in / on the tree)</li>
</ul>
The dative <b>-ge</b> is by far the most used — for "I want", "to me", "I have", "going to". Master this one first.`,

{id:'plurals',name:'Plurals',emoji:'🔢',type:'grammar',
info:`Most Kannada nouns form plurals by adding <code>-ಗಳು (-galu)</code> for things, and <code>-ಅರು (-aru)</code> for honored humans.

<ul><li>ಪುಸ್ತಕ (pustaka) → ಪುಸ್ತಕಗಳು (pustakagalu) – books</li>
<li>ಮಗು (magu) → ಮಕ್ಕಳು (makkalu) – children (irregular)</li>
<li>ಶಿಕ್ಷಕ (shikshaka) → ಶಿಕ್ಷಕರು (shikshakaru) – teachers</li></ul>

Adjectives don't change for plural.


<h3>💡 -galu vs -aru</h3>
<ul>
<li><b>-galu</b> for things and (non-respected) animals: <i>pustaka-galu</i> (books), <i>naayi-galu</i> (dogs).</li>
<li><b>-aru</b> for respected humans: <i>shikshak-aru</i> (teachers), <i>vaidy-aru</i> (doctors).</li>
</ul>
Pluralizing humans with <b>-galu</b> can sound disrespectful — always use <b>-aru</b> for people you respect.`,

{id:'adj',name:'Adjectives',emoji:'🎯',type:'grammar',
info:`Adjectives in Kannada come <b>before</b> the noun and do NOT change for gender or number.

<b>Pattern:</b> [adjective] + [noun]
<ul><li>ದೊಡ್ಡ ಮನೆ (dodda mane) – big house</li>
<li>ಕೆಂಪು ಹೂವು (kempu hoovu) – red flower</li>
<li>ಒಳ್ಳೆಯ ಹುಡುಗ (olleya huduga) – good boy</li></ul>


<h3>💡 The Best News in Kannada</h3>
Unlike Marathi/Hindi where adjectives change with gender (माझा / माझी / माझे), Kannada adjectives <b>don't change at all</b>:
<ul>
<li>olleya huduga (good boy) · olleya hudugi (good girl) · olleya hudugaru (good people)</li>
</ul>
The adjective stays the same. No gender, no number. One less thing to worry about!`,

{id:'neg',name:'Negation',emoji:'❌',type:'grammar',
info:`Kannada uses different negative words depending on what's being negated.

<ul><li><code>illa</code> ಇಲ್ಲ – "is not / does not exist" (verbs)</li>
<li><code>alla</code> ಅಲ್ಲ – "is not (X)" (identity)</li>
<li><code>beda</code> ಬೇಡ – "don't want / don't" (prohibitive)</li></ul>

Examples:
<ul><li>Avanu doctor alla – He is not a doctor.</li>
<li>Naanu hogalilla – I didn't go.</li>
<li>Maatanaadabeda – Don't speak.</li></ul>


<h3>💡 Negation Quick Reference</h3>
<ul>
<li><b>Illa</b> – doesn't exist, doesn't have, didn't happen.<br><i>Naayi illa</i> (no dog) · <i>Naanu hogalilla</i> (I didn't go).</li>
<li><b>Alla</b> – is not (identity).<br><i>Avanu doctor alla</i> (he is not a doctor).</li>
<li><b>Beda</b> – don't want / don't.<br><i>Sakkare beda</i> (no sugar) · <i>Hogabeda</i> (don't go).</li>
</ul>
Past negative: <b>-alilla</b>: <i>Naanu hoogalilla</i> (I didn't go), <i>Naanu nodalilla</i> (I didn't see).`,

{id:'imperatives',name:'Imperatives & Commands',emoji:'🗣️',type:'grammar',
info:`<b>Imperatives</b> are commands or requests. Kannada distinguishes informal vs polite.
<ul>
<li><b>Informal command</b> (to friend / younger): use verb root directly — <code>Baa</code> (come), <code>Tinnu</code> (eat).</li>
<li><b>Polite command</b> (to elder / formal): add <code>-i</code> or <code>-ri</code> — <code>Banni</code> (come), <code>Tinni</code> (eat).</li>
<li><b>Negative command</b>: stem + <code>-beda</code> (informal) or <code>-bedi</code> (polite). <code>Hogabeda</code> (don't go), <code>Helabedi</code> (don't say).</li>
<li>Add <code>dayavittu</code> (please) for extra politeness.</li>
</ul>


<h3>💡 Polite Layer Cake</h3>
<ol>
<li>Verb root alone (rudest): <b>Baa</b> (come, to a friend).</li>
<li>Verb + <b>-i</b> (polite): <b>Banni</b> (come, please).</li>
<li>Add <b>dayavittu</b> (max politeness): <b>Dayavittu banni</b> (please come).</li>
</ol>
With strangers, elders, or anyone older than you, <b>always use polite forms</b>. Using the bare root form is fine with very close friends or children, but rude otherwise.`,

{id:'questions',name:'Question Formation',emoji:'❓',type:'grammar',
info:`Kannada forms questions in two main ways:
<ul>
<li><b>Yes/No questions</b>: add <code>-aa</code> to the verb. Example: <code>Bartiraa?</code> (Are you coming?) Spoken Kannada often uses rising intonation alone: <code>Bartiri?</code></li>
<li><b>WH-questions</b>: use a question word (<code>enu, yaaru, elli, yaavaaga, eke, hege, eshtu, yaava</code>) — usually placed where the answered element would go.</li>
</ul>
Examples:
<ul>
<li><code>Idu enu?</code> — What is this?</li>
<li><code>Neevu yaaru?</code> — Who are you?</li>
<li><code>Ellige hoogutteeri?</code> — Where are you going?</li>
<li><code>Yaavaaga barutteeri?</code> — When will you come?</li>
</ul>


<h3>💡 Tone Alone Works</h3>
In spoken Kannada, often a <b>rising tone</b> alone turns a statement into a question — no <i>-aa</i> needed.
<ul>
<li>Statement: <b>"Bartiri."</b> (You're coming.) — falling tone.</li>
<li>Question: <b>"Bartiri?"</b> (Are you coming?) — rising tone.</li>
</ul>
Just like English: "You're coming?" works as a question with the right intonation.`,

{id:'postp',name:'Postpositions',emoji:'📍',type:'grammar',
info:`Kannada uses <b>postpositions</b> (after the noun) instead of prepositions. They often attach as suffixes to nouns with case markers.
<ul>
<li><code>-alli</code> (in / at): <code>maneyalli</code> (in the house)</li>
<li><code>mele</code> (on / above): <code>meju mele</code> (on the table)</li>
<li><code>kelage</code> (below)</li>
<li><code>jote</code> (with — a person): <code>snehita jote</code> (with friend)</li>
<li><code>-inda</code> (from / by / with-instrument): <code>oorinda</code> (from town)</li>
<li><code>hattira</code> (near)</li>
<li><code>-ge</code> (to / for): <code>shaalege</code> (to school)</li>
</ul>


<h3>💡 Sandhi with Postpositions</h3>
Postpositions cause vowel changes when they fuse with the noun:
<ul>
<li>mane + alli → <b>maneyalli</b> (a 'y' bridges the vowels)</li>
<li>shaale + ge → <b>shaalege</b></li>
<li>ooru + inda → <b>oorinda</b></li>
</ul>
Don't try to memorize each one — just listen and repeat. It becomes automatic.`,

{id:'tenses',title:'Section 12 · The 12 Tenses',color:'orange',sub:'All twelve English tenses with Kannada equivalents',units:[
{id:'t1',name:'1. Simple Present',emoji:'🟢',type:'tense',
info:`<b>Simple Present</b> – habitual actions and general truths.
<b>Pattern:</b> verb root + -utt + person-ending.

<table class="tense-table"><tr><th>Person</th><th>Suffix</th><th>"ಮಾಡು" (do)</th></tr>
<tr><td>Naanu (I)</td><td>-uttene</td><td></td></tr>
<tr><td>Neenu (you)</td><td>-uttiya</td><td></td></tr>
<tr><td>Avanu (he)</td><td>-uttaane</td><td></td></tr>
<tr><td>Avalu (she)</td><td>-uttaale</td><td></td></tr>
<tr><td>Adu (it)</td><td>-uttade</td><td></td></tr>
<tr><td>Naavu (we)</td><td>-utteve</td><td></td></tr>
<tr><td>Avaru (they)</td><td>-uttaare</td><td></td></tr></table>


<h3>💡 Recognition Tip</h3>
Spot the <b>-utt-</b> infix inside the word — that's your simple-present marker:
<ul>
<li>maad-<b>utt</b>-ene (I do) · ood-<b>utt</b>-aane (he reads) · bare-y-<b>utt</b>-aale (she writes).</li>
</ul>
<h3>💡 Spoken Future Hack</h3>
For future, Kannadigas often just use the simple present + a future time word: <b>"Naale baruttene"</b> = "I'll come tomorrow". You don't always need the formal -uvenu future endings.`,

{id:'t2',name:'2. Present Continuous',emoji:'🔵',type:'tense',
info:`<b>Present Continuous</b> – ongoing action right now.
<b>Pattern:</b> verb-utti + iddene-form.

<table class="tense-table"><tr><th>Person</th><th>"ಮಾಡು" form</th><th>Meaning</th></tr>

<tr><td>Avaru</td><td></td><td>They are doing</td></tr></table>


<h3>💡 Sandhi Note</h3>
Present continuous = <b>verb-uttu</b> + <b>iddene-form</b>. The vowels merge in writing.
<ul>
<li>maaduttu + iddene → <b>maaduttiddene</b></li>
<li>tinnuttu + iddaane → <b>tinnuttiddaane</b></li>
</ul>
Spot <b>-uttidd-</b> as the giveaway. The <b>-idd-</b> chunk is the embedded "to be / am".`,

{id:'t3',name:'3. Present Perfect',emoji:'🟣',type:'tense',
info:`<b>Present Perfect</b> – action completed with current relevance ("have/has done").
<b>Pattern:</b> past participle + iddene-form.

<table class="tense-table"><tr><th>Person</th><th>"ಮಾಡು" form</th><th>Meaning</th></tr>
<tr><td>Naanu</td><td></td><td>I have done</td></tr>
<tr><td>Avanu</td><td></td><td>He has done</td></tr>
<tr><td>Avalu</td><td></td><td>She has done</td></tr>
<tr><td>Naavu</td><td></td><td>We have done</td></tr>
<tr><td>Avaru</td><td></td><td>They have done</td></tr></table>


<h3>💡 The "iddene" is Hidden — Sandhi Magic</h3>
Present Perfect = <b>past participle + iddene-form</b>. The participle ends in -i and "iddene" starts with i-, so they merge into one word:
<ul>
<li><b>tindi + iddene</b> → <b>tindiddene</b> (I have eaten)</li>
<li><b>hogi + iddaane</b> → <b>hogiddaane</b> (he has gone)</li>
<li><b>maadi + iddaale</b> → <b>maadiddaale</b> (she has done)</li>
<li><b>ood-i + iddeve</b> → <b>oodiddeve</b> (we have read)</li>
<li><b>bare-d-i + iddaare</b> → <b>barediddaare</b> (they have written)</li>
</ul>
<b>Quick trick</b>: hunt for "<b>-idd-</b>" inside the word — that's the embedded "to be / to have". The ending after it tells you the person:
<ul>
<li><b>-iddene</b> → I · <b>-iddiya</b> → you (informal) · <b>-iddaane</b> → he · <b>-iddaale</b> → she · <b>-iddeve</b> → we · <b>-iddaare</b> → they</li>
</ul>
Kannada writes them as one word because of <b>vowel sandhi</b> (vowels merging at word boundaries) — that's why it looks like "iddene" isn't there, but it is.`,

{id:'t4',name:'4. Present Perfect Continuous',emoji:'🟤',type:'tense',
info:`<b>Present Perfect Continuous</b> – action started in the past and continuing now.
<b>Pattern:</b> [time]-inda + verb-uttiddene = "Since [time], I am doing".

Examples:
<ul><li>eradu gantege-inda ooduttiddene → "I've been reading for two hours"</li>
<li>belaggeyinda kelasa maaduttiddaane → "He's been working since morning"</li></ul>


<h3>💡 The -inda Pattern</h3>
"For / since [time]" uses the ablative <b>-inda</b> suffix:
<ul>
<li>eradu ganteyinda – for two hours</li>
<li>belaggeyinda – since morning</li>
<li>tingalinda – for a month</li>
<li>ninneyinda – since yesterday</li>
</ul>
Then attach the present continuous (<i>verb-uttiddene</i>). Same idea as English "since/for + present perfect continuous".`,

{id:'t5',name:'5. Simple Past',emoji:'🟡',type:'tense',
info:`<b>Simple Past</b> – completed action in the past.
<b>Pattern:</b> verb root + -id + person-ending.

<table class="tense-table"><tr><th>Person</th><th>"ಮಾಡು" form</th><th>Meaning</th></tr>

<tr><td>Avaru</td><td></td><td>They did</td></tr></table>


<h3>💡 Irregular Past Stems</h3>
Many common verbs have irregular past forms — memorize these:
<ul>
<li>tinnu (eat) → <b>tinde</b> (ate)</li>
<li>baru (come) → <b>bande</b> (came)</li>
<li>hoogu (go) → <b>hode</b> (went)</li>
<li>kodu (give) → <b>kotte</b> (gave)</li>
<li>maadu (do) → <b>maadide</b> (did)</li>
<li>nodu (see) → <b>node</b> (saw)</li>
</ul>
Regular pattern: stem + <b>-id-</b> + person ending. But irregulars are extremely common — drill them.`,

info:`<b>Past Perfect</b> – action completed before another past action ("had done").

<h3>💡 Same Sandhi as Present Perfect</h3>

<h3>💡 Spoken Kannada Shortcut</h3>
In everyday speech, Kannadigas often use the <b>simple present</b> for future — context (a time word) makes it clear:

/* ========== STATE & APP LOGIC ========== */
const state = {
  view: 'home',     // home | unit | flashcard | quiz | complete
  sectionId: null,
  unitId: null,
  unitTab: 'overview', // overview | flashcard | quiz
  cardIndex: 0,
  quizIndex: 0,
  quizQuestions: [],
  quizCorrect: 0,
  quizAnswered: false,
  matchState: null,
  buildState: null,
  xp: 0,
  streak: 0,
  gems: 500,
  completedUnits: new Set(),
  feedback: null,
  selected: null
};

const $app = document.getElementById('app');

function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }
function pick(arr,n){ return shuffle(arr).slice(0,n); }
function findUnit(sid,uid){
  const s = CURRICULUM.find(s=>s.id===sid);
  return s ? s.units.find(u=>u.id===uid) : null;
}
function allCards(){ return CURRICULUM.flatMap(s=>s.units.flatMap(u=>u.cards||[])); }
function unitKey(sid,uid){ return sid+':'+uid; }

/* ========== RENDERERS ========== */
function renderTopbar(){
  return `<div class="topbar">
    <div class="logo" onclick="goHome()"><span class="owl">🦉</span> Kannada Quest</div>
    <div class="stats">
      <div class="stat streak"><span class="icon">🔥</span>${state.streak}</div>
      <div class="stat xp"><span class="icon">⭐</span>${state.xp}</div>
      <div class="stat gems"><span class="icon">💎</span>${state.gems}</div>
    </div>
  </div>`;
}

function renderHome(){
  let html = renderTopbar();
  html += `<div class="welcome">
    <h1>Kannada Quest 🦉</h1>
    <p>Learn Kannada from greetings to grammar — Duolingo-style.</p>
    <div class="small">All sections unlocked · No heart limits · Earn XP & gems</div>
  </div>
  <div onclick="openCustomQuiz()" style="background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-radius:18px;padding:18px 22px;margin-bottom:18px;cursor:pointer;box-shadow:0 5px 0 var(--purple-dark);display:flex;justify-content:space-between;align-items:center;gap:14px;">
    <div>
      <div style="font-weight:900;font-size:18px;">🎯 Custom Quiz Builder</div>
      <div style="opacity:.95;font-size:13px;margin-top:3px;">Pick any category & any number of questions · Reshuffle to practice again</div>
    </div>
    <div style="font-size:30px;font-weight:900;">→</div>
  </div>`;
  for (const sec of CURRICULUM){
    const completed = sec.units.filter(u=>state.completedUnits.has(unitKey(sec.id,u.id))).length;
    html += `<div class="section-header ${sec.color}">
      <div>
        <div class="section-name">${sec.title}</div>
        <div class="section-sub">${sec.sub}</div>
      </div>
      <div style="font-weight:900;font-size:15px;text-align:right;white-space:nowrap;">${completed}/${sec.units.length} ✓</div>
    </div>`;
    html += `<div class="units-grid">`;
    for (const u of sec.units){
      const isDone = state.completedUnits.has(unitKey(sec.id,u.id));
      html += `<div class="unit-card ${isDone?'completed':''}" onclick="openUnit('${sec.id}','${u.id}')">
        ${isDone?'<div class="badge">★</div>':''}
        <div class="emoji">${u.emoji}</div>
        <div class="name">${u.name}</div>
      </div>`;
    }
    html += `</div>`;
  }
  $app.innerHTML = html;
}

function renderUnit(){
  const u = findUnit(state.sectionId, state.unitId);
  if (!u) { goHome(); return; }
  let html = renderTopbar();
  html += `<div class="screen">
    <div class="lesson-top">
      <button class="back-btn" onclick="goHome()">←</button>
      <div>
        <div class="lesson-title">${u.emoji} ${u.name}</div>
        <div class="lesson-sub">${u.cards.length} cards · ${(u.sentences||[]).length} example sentences</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${state.unitTab==='overview'?'active':''}" onclick="setTab('overview')">Overview</div>
      <div class="tab ${state.unitTab==='flashcard'?'active':''}" onclick="startFlash()">Flashcards</div>
      <div class="tab ${state.unitTab==='quiz'?'active':''}" onclick="startQuiz()">Quiz</div>
    </div>`;
  if (u.info){
    html += `<div class="lesson-info"><h3>📘 Learn the concept</h3>${u.info}</div>`;
  } else {
    html += `<div class="lesson-info"><h3>📘 ${u.name}</h3>Tap the flashcards to learn the vocabulary, then take the quiz to test what you've learned. Each correct answer earns you XP!</div>`;
  }
  html += `<h3 style="margin:18px 0 10px;color:var(--text);">Words in this lesson</h3>`;
  for (const c of u.cards.slice(0,8)){
    html += `<div class="example-sentence"><span class="kn" style="font-family:'Nunito',sans-serif;font-size:19px;">${c.tr}</span><div class="en">${c.en}${c.ma?` <span style="color:var(--purple-dark);">· ${c.ma}</span>`:''+''}</div></div>`;
  }
  if (u.cards.length > 8) html += `<p style="text-align:center;color:var(--text-light);font-weight:700;">…and ${u.cards.length-8} more — see them all in Flashcards</p>`;
  if ((u.sentences||[]).length){
    html += `<h3 style="margin:18px 0 10px;color:var(--text);">Example sentences</h3>`;
    for (const s of u.sentences){
      html += `<div class="example-sentence"><span class="kn" style="font-family:'Nunito',sans-serif;font-size:18px;">${s.tr}</span><div class="en">${s.en}${s.ma?` <span style="color:var(--purple-dark);">· ${s.ma}</span>`:''+''}</div></div>`;
    }
  }
  html += `<div class="btn-row" style="margin-top:20px;">
    <button class="btn" onclick="startFlash()">📇 Start Flashcards</button>
    <button class="btn blue" onclick="startQuiz()">🎯 Take Quiz</button>
  </div></div>`;
  $app.innerHTML = html;
}

function renderFlash(){
  const u = findUnit(state.sectionId, state.unitId);
  if (!u || !u.cards.length) { goHome(); return; }

/* ========== QUIZ ========== */
function buildQuestions(u){
  const cards = u.cards;
  const pool = allCards();
  const qs = [];
  const used = new Set();
  const num = Math.min(10, cards.length * 2);
  const types = ['mc_en','mc_kn','match','build','type'];
  // Generate a varied mix
  for (let i = 0; i < num; i++){
    const card = cards[i % cards.length];
    let type;
    // First 2 are simple mc_en, then mix it up
    if (i < 2) type = 'mc_en';
    else if (i === 2 && cards.length >= 4) type = 'match';
    else if (i === num-1 && u.sentences && u.sentences.length) type = 'build';
    else type = types[Math.floor(Math.random() * 3)]; // mc_en, mc_kn, match mainly
    
    if (type === 'match' && cards.length < 4) type = 'mc_en';
    if (type === 'build' && (!u.sentences || !u.sentences.length)) type = 'mc_kn';

    if (type === 'mc_en'){
      // Kannada → English
      const distractors = pick(cards.filter(c=>c.en!==card.en), 3);
      if (distractors.length < 3){
        const extras = pick(pool.filter(c=>c.en!==card.en && !distractors.find(d=>d.en===c.en)), 3-distractors.length);
        distractors.push(...extras);
      }
      const opts = shuffle([card, ...distractors]);
      qs.push({type, card, options: opts, correctIdx: opts.findIndex(o=>o.en===card.en)});
    } else if (type === 'mc_kn'){
      // English → Kannada
      const distractors = pick(cards.filter(c=>c.kn!==card.kn), 3);
      if (distractors.length < 3){
        const extras = pick(pool.filter(c=>c.kn!==card.kn && !distractors.find(d=>d.kn===c.kn)), 3-distractors.length);
        distractors.push(...extras);
      }
      const opts = shuffle([card, ...distractors]);
      qs.push({type, card, options: opts, correctIdx: opts.findIndex(o=>o.kn===card.kn)});
    } else if (type === 'match'){
      const matchCards = pick(cards, Math.min(4, cards.length));
      qs.push({type, pairs: matchCards, left: shuffle(matchCards.map(c=>c.tr)), right: shuffle(matchCards.map(c=>c.en))});
    } else if (type === 'build'){
      const sent = pick(u.sentences, 1)[0];
      const words = sent.tr.split(/\s+/);
      const extras = shuffle(['matte','aadare','bahala','tumbaa']).slice(0, Math.max(0, 4-words.length));
      qs.push({type, sentence: sent, words: shuffle([...words, ...extras])});
    } else if (type === 'type'){
      qs.push({type:'mc_en', card, options: shuffle([card, ...pick(pool.filter(c=>c.en!==card.en),3)]), correctIdx: 0});
      qs[qs.length-1].correctIdx = qs[qs.length-1].options.findIndex(o=>o.en===card.en);
    }
  }
  return qs;
}

      let cls = 'match-item';
      if (ms.matched.has('L'+idx)) cls += ' matched';
      if (ms.leftPicked === idx) cls += ' selected';
      if (ms.wrong && ms.wrong[0]==='L' && ms.wrong[1]===idx) cls += ' wrong';
      html += `<button class="${cls}" onclick="matchPick('L',${idx})">${kn}</button>`;
    });
    html += `</div><div class="match-col">`;
    q.right.forEach((en,idx)=>{
      let cls = 'match-item';
      if (ms.matched.has('R'+idx)) cls += ' matched';

      if (ms.wrong && ms.wrong[0]==='R' && ms.wrong[1]===idx) cls += ' wrong';

    });

    });

  }

  html += `</div>`;

function selectOption(idx){
  if (state.quizAnswered) return;
  state.selected = idx;
  const q = state.quizQuestions[state.quizIndex];
  const correct = idx === q.correctIdx;
  state.quizAnswered = true;
  if (correct){ state.quizCorrect++; state.xp += 10; state.gems += 1; }
  const answer = q.type === 'mc_en' ? q.card.en : q.card.tr;
  const maHint = q.card.ma ? ` · ${q.card.ma}` : ''+''; state.feedback = {correct, detail: correct ? `+10 XP · ${q.card.tr} = ${q.card.en}${maHint}` : `Correct: ${q.card.tr} = ${q.card.en}${maHint}`};
  renderQuiz();
}

function matchPick(side, idx){
  const q = state.quizQuestions[state.quizIndex];
  const ms = state.matchState;
  if (ms.matched.has(side+idx)) return;
  if (side === 'L') ms.leftPicked = idx;
  else ms.rightPicked = idx;
  renderQuiz();
  if (ms.leftPicked !== null && ms.rightPicked !== null){
    const knText = q.left[ms.leftPicked];
    const enText = q.right[ms.rightPicked];
    const pair = q.pairs.find(p=>p.tr===knText);
    if (pair && pair.en === enText){
      ms.matched.add('L'+ms.leftPicked); ms.matched.add('R'+ms.rightPicked);
      ms.leftPicked = null; ms.rightPicked = null;
      state.xp += 3;
      if (ms.matched.size === q.pairs.length*2){
        state.quizCorrect++; state.xp += 5; state.gems += 1;
        state.quizAnswered = true;
        state.feedback = {correct:true, detail:'All pairs matched! +20 XP total'};
      }
      renderQuiz();
    } else {
      ms.wrong = [side, idx];
      renderQuiz();
      setTimeout(()=>{ ms.wrong = null; ms.leftPicked = null; ms.rightPicked = null; renderQuiz(); }, 600);
    }
  }
}

function buildAdd(i){
  if (state.quizAnswered) return;
  const bs = state.buildState;
  if (bs.used.has(i)) return;
  bs.used.add(i); bs.built.push(i);
  renderQuiz();
}
function buildRemove(pos){
  if (state.quizAnswered) return;
  const bs = state.buildState;
  const wi = bs.built[pos];
  bs.built.splice(pos,1); bs.used.delete(wi);
  renderQuiz();
}
function checkBuild(){
  const q = state.quizQuestions[state.quizIndex];
  const bs = state.buildState;
  const built = bs.built.map(i=>q.words[i]).join(' ').trim();
  const target = q.sentence.tr.trim();
  // Compare ignoring extra spaces
  const correct = built.replace(/\s+/g,' ') === target.replace(/\s+/g,' ');
  state.quizAnswered = true;
  if (correct){ state.quizCorrect++; state.xp += 15; state.gems += 2; }
  state.feedback = {correct, detail: correct ? `+15 XP · Perfect sentence!` : `Correct: ${q.sentence.tr} — ${q.sentence.en}`};
  renderQuiz();
}

function launchCustomQuiz(){
  const sel = document.getElementById('custom-cat').value;
  const [sid, uid] = sel.split('::');
  let cards = [];
  let label = '';
  if (sid === 'all'){
    cards = allCards();
    label = 'All Categories';
  } else if (uid === 'all'){
    const sec = CURRICULUM.find(s=>s.id===sid);
    if (sec){ cards = sec.units.flatMap(u=>u.cards||[]); label = sec.title; }
  } else {
    const u = findUnit(sid, uid);
    if (u){ cards = u.cards || []; label = u.emoji + ' ' + u.name; }
  }
  if (!cards.length){ alert('No cards available in this category.'); return; }
  let num = parseInt(document.getElementById('custom-num').value, 10);
  if (!num || num < 1) num = 10;
  if (num > 500) num = 500;

  // Pick cards: sample without replacement if possible, else allow repeats
  let selectedCards;
  if (num <= cards.length){
    selectedCards = pick(cards, num);
  } else {
    selectedCards = [];
    while (selectedCards.length < num){
      const batch = shuffle(cards);
      for (const c of batch){
        if (selectedCards.length < num) selectedCards.push(c); else break;
      }
    }
  }
  state.customCards = selectedCards;
  state.customLabel = label;
  state.view = 'custom-quiz';
  state.quizQuestions = buildCustomQuestions(selectedCards);
  state.quizIndex = 0;
  state.quizCorrect = 0;
  state.quizAnswered = false;
  state.feedback = null;
  state.selected = null;
  renderCustomQuiz();
  window.scrollTo(0,0);
}

function buildCustomQuestions(cards){
  const pool = allCards();
  const qs = [];
  cards.forEach(card => {
    // Random direction: 50/50 between Romanized→English and English→Romanized (vice versa)
    const type = Math.random() < 0.5 ? 'mc_en' : 'mc_kn';
    // Pick 3 distractors that don't match the answer
    let distractors = pool.filter(c => c.tr !== card.tr && c.en !== card.en);
    distractors = pick(distractors, 3);
    const opts = shuffle([card, ...distractors]);
    const correctIdx = opts.findIndex(o => o.tr === card.tr && o.en === card.en);
    qs.push({type, card, options: opts, correctIdx});
  });
  // Shuffle question order
  return shuffle(qs);
}

  state.quizAnswered = true;
  if (correct){ state.quizCorrect++; state.xp += 10; state.gems += 1; }
  const maHint = q.card.ma ? ` · ${q.card.ma}` : ''+''; state.feedback = {correct, detail: correct ? `+10 XP · ${q.card.tr} = ${q.card.en}${maHint}` : `Correct: ${q.card.tr} = ${q.card.en}${maHint}`};
  renderCustomQuiz();
}

function nextCustomQuestion(){
  state.quizIndex++;
  state.quizAnswered = false;
  state.feedback = null;
  state.selected = null;
  if (state.quizIndex >= state.quizQuestions.length) renderCustomComplete();
  else renderCustomQuiz();
}

function confirmExitCustom(){
  if (confirm('Exit the quiz? Your progress will be lost.')) goHome();
}

function renderCustomComplete(){
  const total = state.quizQuestions.length;
  const score = state.quizCorrect;
  const pct = Math.round((score/total)*100);
  const passed = pct >= 60;
  if (passed) state.streak++;
  let html = renderTopbar();
  html += `<div class="screen complete">
    <div class="complete-emoji">${passed?'🎉':'💪'}</div>
    <div class="complete-title">${passed?'Custom Quiz Complete!':'Good practice!'}</div>
    <p style="color:var(--text);font-size:15px;margin-bottom:4px;">${state.customLabel||'Custom Quiz'}</p>
    <p style="color:var(--text-light);font-size:13px;">${state.customCards.length} cards · ${total} questions</p>
    <div class="complete-stats">
      <div class="cstat"><div class="cstat-icon">🎯</div><div class="cstat-num">${score}/${total}</div><div class="cstat-label">Correct</div></div>
      <div class="cstat"><div class="cstat-icon">⭐</div><div class="cstat-num">+${score*10}</div><div class="cstat-label">XP earned</div></div>
      <div class="cstat"><div class="cstat-icon">📊</div><div class="cstat-num">${pct}%</div><div class="cstat-label">Score</div></div>
    </div>
    <div style="background:#fff;padding:16px;border-radius:14px;margin:18px 0;border:2px solid var(--purple);box-shadow:0 3px 0 var(--purple-dark);">
      <h3 style="color:var(--purple-dark);margin-bottom:8px;">🔁 Practice again with the same cards</h3>
      <p style="color:var(--text);font-size:14px;margin-bottom:14px;">Repeat the <b>same ${state.customCards.length} card${state.customCards.length===1?'':'s'}</b> in a freshly shuffled random order. Question directions are re-randomized too — perfect for drilling these into memory!</p>
      <button class="btn" style="background:var(--purple);box-shadow:0 4px 0 var(--purple-dark);width:100%;" onclick="repeatCustomQuiz()">🔀 Repeat with Shuffle</button>
    </div>
    <div class="btn-row">
      <button class="btn outline" onclick="openCustomQuiz()">🆕 New Custom Quiz</button>
      <button class="btn blue" onclick="goHome()">🏠 Home</button>
    </div>
  </div>`;
  $app.innerHTML = html;
  window.scrollTo(0,0);
}

function repeatCustomQuiz(){
  // Same cards, fresh randomization & question types
  state.quizQuestions = buildCustomQuestions(state.customCards);
  state.quizIndex = 0;
  state.quizCorrect = 0;
  state.quizAnswered = false;
  state.feedback = null;
  state.selected = null;
  state.view = 'custom-quiz';
  renderCustomQuiz();
  window.scrollTo(0,0);
}


/* ========== BOOT ========== */
renderHome();
</script>
</body>
</html>
